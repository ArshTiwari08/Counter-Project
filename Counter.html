<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simple Counter</title>
    <link rel="stylesheet" href="Counter.css">
</head>
<body>
    <div class="container">
        <div class="counter">
            <p id="count">0</p>
        </div>
    <div>
        <button>Decrement</button>
        <button>Increment</button>
    </div>
    <div class="clicks">
        <p>Click on Increment :<span id="IncCount">0</span></p>
        <p>Click on Decrement :<span id="DecCount">0</span></p>
    </div>
    </div>
</body>
<script src="Counter.js"></script>
</html>
